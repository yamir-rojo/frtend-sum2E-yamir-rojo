<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solicitar Turno — SaludPlus</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="turnos.css" />
    <script defer src="js/validaciones.js"></script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html">SaludPlus</a>
        <button class="nav-toggle" aria-controls="primary-navigation" aria-expanded="false" aria-label="Abrir menú">☰</button>
        <nav id="primary-navigation" class="primary-nav" aria-label="Navegación principal">
          <ul>
            <li><a href="index.html#servicios">Servicios</a></li>
            <li><a href="index.html#equipo">Equipo</a></li>
            <li><a href="turnos.html">Solicitar turno</a></li>
            <li><a href="index.html#contacto">Contacto</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="card">
        <div class="card-header">
          <h1>Solicitar turno</h1>
          <p>Completa el formulario y te confirmaremos la disponibilidad.</p>
        </div>

        <form id="form-turno" novalidate>
        <fieldset>
          <legend>Datos del paciente</legend>
          <div class="form-row">
            <label for="nombre">Nombre</label>
            <input id="nombre" name="nombre" type="text" placeholder="Nombre" required />
          </div>
          <div class="form-row">
            <label for="apellido">Apellido</label>
            <input id="apellido" name="apellido" type="text" placeholder="Apellido" required />
          </div>
          <div class="form-row">
            <label for="dni">DNI</label>
            <input id="dni" name="dni" type="text" placeholder="DNI" required />
          </div>
          <div class="form-row">
            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" placeholder="nombre@ejemplo.com" required />
          </div>
          <div class="form-row">
            <label for="telefono">Teléfono</label>
            <input id="telefono" name="telefono" type="tel" placeholder="+54 9 11 1234 5678" required />
          </div>
          <div class="form-row">
            <label for="nacimiento">Fecha de nacimiento</label>
            <input id="nacimiento" name="nacimiento" type="date" required />
          </div>
          <div class="form-row">
            <label for="genero">Género</label>
            <select id="genero" name="genero" required>
              <option value="">Seleccionar</option>
              <option>Masculino</option>
              <option>Femenino</option>
              <option>Otro</option>
              <option>Prefiero no especificar</option>
            </select>
          </div>
        </fieldset>

        <fieldset>
          <legend>Datos del turno</legend>
          <div class="form-row">
            <label for="especialidad">Especialidad</label>
            <select id="especialidad" name="especialidad" required>
              <option value="">Seleccionar</option>
              <option value="Clinica General">Clínica General</option>
              <option value="Cardiologia">Cardiología</option>
              <option value="Pediatria">Pediatría</option>
              <option value="Ginecologia">Ginecología</option>
              <option value="Traumatologia">Traumatología</option>
              <option value="Neurologia">Neurología</option>
            </select>
          </div>
          <div class="form-row">
            <label for="medico">Médico</label>
            <select id="medico" name="medico" disabled required>
              <option value="">Seleccione especialidad primero</option>
            </select>
          </div>
          <div class="form-row">
            <label for="tipo_consulta">Tipo de consulta</label>
            <select id="tipo_consulta" name="tipo_consulta" required>
              <option value="">Seleccionar</option>
              <option>Primera consulta</option>
              <option>Control</option>
              <option>Resultado de estudios</option>
            </select>
          </div>
          <div class="form-row">
            <label for="fecha_turno">Fecha del turno</label>
            <input id="fecha_turno" name="fecha_turno" type="date" required />
          </div>
          <div class="form-row">
            <label for="hora_turno">Hora del turno</label>
            <input id="hora_turno" name="hora_turno" type="time" required />
          </div>
          <div class="form-row">
            <label for="modalidad">Modalidad</label>
            <select id="modalidad" name="modalidad" required>
              <option value="">Seleccionar</option>
              <option value="Presencial">Presencial</option>
              <option value="Videoconsulta">Videoconsulta</option>
            </select>
          </div>
          <div class="form-row" id="plataforma-row" style="display:none">
            <label for="plataforma">Plataforma preferida</label>
            <select id="plataforma" name="plataforma">
              <option value="">Seleccionar</option>
              <option>Zoom</option>
              <option>Google Meet</option>
              <option>Teams</option>
            </select>
          </div>
        </fieldset>

        <fieldset>
          <legend>Cobertura médica</legend>
          <div class="form-row">
            <label for="cobertura">Cobertura</label>
            <select id="cobertura" name="cobertura" required>
              <option value="">Seleccionar</option>
              <option>OSDE</option>
              <option>Swiss Medical</option>
              <option>Galeno</option>
              <option>IOMA</option>
              <option>Medicus</option>
              <option>Sancor Salud</option>
              <option>Particular</option>
            </select>
          </div>
          <div class="form-row" id="credencial-row" style="display:none">
            <label for="numero_credencial">Número de credencial</label>
            <input id="numero_credencial" name="numero_credencial" type="text" placeholder="Número de credencial" />
          </div>
          <div class="form-row" id="plan-row" style="display:none">
            <label for="plan">Plan</label>
            <input id="plan" name="plan" type="text" placeholder="Plan (si aplica)" />
          </div>
        </fieldset>

        <fieldset>
          <legend>Información adicional</legend>
          <div class="form-row">
            <label for="primera_visita">
              <input id="primera_visita" name="primera_visita" type="checkbox" /> Es la primera vez que consulta en SaludPlus
            </label>
          </div>
          <div class="form-row" id="conocio-row" style="display:none">
            <label for="como_nos_conocio">¿Cómo nos conoció?</label>
            <select id="como_nos_conocio" name="como_nos_conocio">
              <option value="">Seleccionar</option>
              <option>Busqueda en internet</option>
              <option>Recomendacion de un conocido</option>
              <option>Redes sociales</option>
              <option>Otro</option>
            </select>
          </div>
          <div class="form-row full-width">
            <label for="motivo">Motivo de consulta</label>
            <textarea id="motivo" name="motivo" rows="4" placeholder="Describa brevemente el motivo de la consulta" required></textarea>
          </div>
          <div class="form-row">
            <label for="estudios_previos">
              <input id="estudios_previos" name="estudios_previos" type="checkbox" /> Tiene estudios previos relacionados con la consulta
            </label>
          </div>
          <div class="form-row full-width" id="estudios-row" style="display:none">
            <label for="descripcion_estudios">Descripción de estudios</label>
            <textarea id="descripcion_estudios" name="descripcion_estudios" rows="3" placeholder="Describa los estudios (fechas, lugar, resultados)"></textarea>
          </div>
        </fieldset>

        <div class="form-actions">
          <button type="submit" class="btn primary">Solicitar Turno</button>
          <button type="reset" class="btn">Limpiar formulario</button>
          <a class="btn" href="index.html">Volver</a>
        </div>
        <p class="form-status" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© <span id="year"></span> SaludPlus — Consultorio médico</p>
      </div>
    </footer>
  </body>
</html>
